<!DOCTYPE html>
<html lang="ru">

<script>
    // Версионирование: здесь вы можете просто менять путь к файлу
    const CURRENT_VERSION_PATH = "К лендинг.html";

    // Динамическая установка мета-рефреша (запасной вариант)
    document.write(`<meta http-equiv="refresh" content="5; url='./${CURRENT_VERSION_PATH}'">`);

    // Небольшая задержка для красоты анимации, затем переход через JS
    setTimeout(() => {
        window.location.replace(CURRENT_VERSION_PATH);
    }, 4000);
</script>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аврора — Загрузка...</title>
    <!-- Мета-рефеш теперь формируется динамично выше в скрипте -->

    <style>
        :root {
            --dark: #6C5444;
            --accent: #E4E2DE;
            --white: #ffffff;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--dark);
            font-family: 'Manrope', -apple-system, sans-serif;
            color: var(--accent);
            overflow: hidden;
        }

        .loading-container {
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        .logo-wrapper {
            margin-bottom: 30px;
            position: relative;
        }

        .logo-box {
            width: 80px;
            height: 80px;
            background: var(--accent);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 900;
            color: var(--dark);
            margin: 0 auto;
            position: relative;
            z-index: 2;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .logo-pulse {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: var(--accent);
            border-radius: 16px;
            z-index: 1;
            animation: pulse 2s infinite;
        }

        .loading-text {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.8;
            margin-top: 20px;
        }

        .progress-bar {
            width: 200px;
            height: 2px;
            background: rgba(228, 226, 222, 0.2);
            margin: 20px auto 0;
            position: relative;
            overflow: hidden;
            border-radius: 2px;
        }

        .progress-line {
            position: absolute;
            width: 40%;
            height: 100%;
            background: var(--accent);
            animation: moveProgress 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.8);
                opacity: 0;
            }
        }

        @keyframes moveProgress {
            0% {
                left: -40%;
            }

            100% {
                left: 100%;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fallback-link {
            position: absolute;
            bottom: 30px;
            font-size: 14px;
            opacity: 0.5;
            text-decoration: none;
            color: var(--accent);
            transition: opacity 0.3s;
        }

        .fallback-link:hover {
            opacity: 1;
        }
    </style>
</head>

<body>

    <div class="loading-container">
        <div class="logo-wrapper">
            <div class="logo-pulse"></div>
            <div class="logo-box">А</div>
        </div>
        <div class="loading-text">Аврора</div>
        <div class="progress-bar">
            <div class="progress-line"></div>
        </div>
    </div>

    <script>
        document.write(`<a href="./${CURRENT_VERSION_PATH}" class="fallback-link">Нажмите здесь, если загрузка не началась автоматически</a>`);
    </script>

</body>

</html>
